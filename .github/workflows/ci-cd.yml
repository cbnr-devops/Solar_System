name: CI/CD - solar-system

on:
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs: 
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: string
        options:
          - dev
          - staging
          - production
permissions:
  id-token: write
  contents: read

jobs:
  build:
    uses: cbnr-devops/GitHub-reusable-workflows/.github/workflows/build.yml@sks-16
    with:
      image_name: solar-system
      image_tag: ${{ github.run_number }}
      install_command: npm ci
      test_command: npm test

      owasp_enabled: false
      owasp_project_name: solar-system

      sonar_enabled: true
      sonar_project_key: sk-solar-project_solar-system
      sonar_project_name: solar-system

      trivy_enabled: true

      aws_region: ap-southeast-2           
      aws_account_id: ${{ github.repository_owner == 'cbnr-devops' && '987569578177' || '' }}
      ecr_repository: solar-system

    secrets:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      CI_ROLE_ARN:  ${{ secrets.CI_ROLE_ARN }}

  deploy_dev:
    needs: build
    uses: cbnr-devops/GitHub-reusable-workflows/.github/workflows/deploy.yml@sks-16
    with:
      environment: dev
      cluster_name: dev-cluster
      aws_region: ap-southeast-2               
      namespace: dev
      helm_path: ./helm/solar-system
      values_file: values-dev.yaml
      release_name: solar-system
      image_name: ${{ needs.build.outputs.built_image_name }}
      image_tag: ${{ needs.build.outputs.built_image_tag }}
    secrets:
      CI_ROLE_ARN: ${{ secrets.CI_ROLE_ARN }}

  deploy_staging:
    if: github.ref_name == 'main'
    needs: deploy_dev
    uses: cbnr-devops/GitHub-reusable-workflows/.github/workflows/deploy.yml@sks-16
    with:
      environment: staging
      cluster_name: staging-cluster
      aws_region: ap-southeast-2
      namespace: staging
      helm_path: ./helm/solar-system
      release_name: solar-system
      image_name: ${{ needs.build.outputs.built_image_name }}
      image_tag: ${{ needs.build.outputs.built_image_tag }}
    secrets:
      CI_ROLE_ARN: ${{ secrets.CI_ROLE_ARN }}